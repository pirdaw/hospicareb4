<!doctype html>
<html lang="en">

            <button type="submit">Login</button>

        </div>
      </div>

      <!-- BAGIAN KANANNN -->
      <div class="right">
        <div class="circle-content">
          <h1>SIMRS</h1>
          <p>Sistem Pendaftaran Rumah Sakit</p>
          <div class="ikon">Rumah Sakit Graha Sehat</div>
        </div>
      </div>
    </div>
  </body>
</html>
